# Designer Agent Configuration Template
# Deploy with: /deploy designer [name]
# Example: /deploy designer designer1

version: "1"

# Onchain registration settings
onchain:
  register: true  # Auto-register all agents on deploy

parameters:
  - name: name
    default: designer
    description: Name for this agent (e.g., designer1, ui-designer)
  - name: description
    default: A frontend designer agent
    description: What this agent does

defaults:
  runtime: claude-code-cli  # Uses Max plan credentials
  model: opus
  requireAuth: true
  apiKey: ${env:ID_AGENT_API_KEY}
  plugins:
    - name: frontend-design
      path: ../plugins/claude-code/frontend-design
    - name: id-rest-ap
      path: ../plugins/claude-code/id-rest-ap

agents:
  - name: ${name}
    local: true             # Run locally to use Max plan
    description: ${description}
