# Heartbeat Config for Designer Agents
# Keeps designer agents engaged with design tasks

interval: 600  # seconds (10 minutes)

message: |
  **From: Manager**

  **Instruction:** Design check-in time.

  [TESTING] Send a brief status update to me via /talk-to after completing this.

  ToDo:
  1. What design task are you working on?
  2. Have you created or updated any design artifacts?
  3. Do you need feedback or approval?
  4. Are there any design decisions that need discussion?

  If your task is complete, share the results with the team.
  If waiting for feedback, check your news feed for responses.
