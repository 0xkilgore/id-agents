# Editorial team: Codex editor + Cursor frontend designer.
#
# Exercises the cross-runtime story end-to-end:
#   editor      -> codex runtime, deploys as AGENTS.md + .agents/skills/
#   frontender  -> cursor-cli runtime, deploys as AGENTS.md (skills dropped per cursor convention)
#
# Both agents reference library entries in /configs/agents/.

version: "1"
team: editorial

defaults:
  local: true
  skills:
    - identity
    - inter-agent
    - catalog

agents:
  - name: editor
    description: "Copy editor + anti-AI-pattern editor (Codex)"
    runtime: codex
    workingDirectory: /Users/nxt3d/projects/editor-sandbox
    agent: editor

  - name: frontender
    description: "Frontend designer (Cursor)"
    runtime: cursor-cli
    workingDirectory: /Users/nxt3d/projects/frontend-sandbox
    agent: frontend
