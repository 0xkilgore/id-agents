# Solidity security reviewer demo team.
#
# Single-agent team exercising the new v3 library entry
# /configs/agents/solidity-security/ against a fresh workspace.
# No bundled skills in the library entry; the team config leaves
# skills: unset so the agent runs persona-only.

version: "1"
team: solidity-security

defaults:
  local: true
  runtime: claude-code-cli
  skills:
    - identity
    - inter-agent
    - catalog

agents:
  - name: auditor
    description: "Adversarial Solidity / Foundry security reviewer"
    workingDirectory: /Users/nxt3d/projects/audit-sandbox
    agent: solidity-security
