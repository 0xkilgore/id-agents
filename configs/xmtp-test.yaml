# XMTP Test Team
# Deploy with: /deploy xmtp-test
#
# Two agents for testing encrypted cross-team messaging via XMTP.
# Each agent gets an OWS wallet and ID Chain ENS name.

version: "1"
team: xmtp-test

defaults:
  local: true
  runtime: claude-code-cli
  model: claude-sonnet-4-6
  skills:
    - identity
    - inter-agent
    - catalog
    - xmtp

agents:
  - name: alice
    description: "XMTP test agent — sends and receives encrypted messages"
    workingDirectory: /Users/nxt3d/projects/id2/id-agents

  - name: bob
    description: "XMTP test agent — sends and receives encrypted messages"
    workingDirectory: /Users/nxt3d/projects/id2/id-agents
