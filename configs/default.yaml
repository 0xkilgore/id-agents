# Default Team
# Deploy with: /deploy default
#
# Ships as a 2-agent Claude Code team (coder + researcher).
# The runtime mix is decided at setup time by scripts/detect-runtimes.sh:
#   - claude + codex  → researcher flipped to codex (mixed team)
#   - claude only     → file used as-is (both claude-code-cli)
#   - codex only      → both agents flipped to codex
#   - neither         → abort; install Claude or Codex (Cursor is opt-in: per-agent runtime: cursor-cli)
# See QUICKSTART step 4.

version: "1"
team: default

defaults:
  local: true
  runtime: claude-code-cli
  skills:
    - identity
    - inter-agent
    - catalog

agents:
  - name: coder
    description: "Writes and reviews code"

  - name: researcher
    description: "Research, analysis, and documentation"
