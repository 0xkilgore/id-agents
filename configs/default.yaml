# Default Team
# Deploy with: /deploy default
#
# Ships as a minimal Claude Code team (just `coder`). Add more agents
# by editing this file — for example, append a Codex `researcher` if
# you have the Codex CLI installed and authenticated. See QUICKSTART
# step 4 for the snippet.

version: "1"
team: default

defaults:
  local: true
  runtime: claude-code-cli
  skills:
    - identity
    - inter-agent
    - catalog

agents:
  - name: coder
    description: "Writes and reviews code"
