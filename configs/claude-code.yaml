# Example: Single Agent (Claude Code)
# Deploy with: /deploy configs/example-single.yaml

version: "1"

defaults:
  local: true
  runtime: claude-code-cli
  skills:
    - identity
    - inter-agent
    - catalog

agents:
  - name: coder
    description: "A coding assistant agent"
    model: claude-opus-4-6
    workingDirectory: /path/to/project
