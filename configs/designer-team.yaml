# Designer Team Configuration
# Deploy with: /deploy designer-team
# Deploys 3 designer agents at once

version: "1"

# Onchain registration settings
onchain:
  register: true  # Auto-register all agents on deploy

defaults:
  model: claude-haiku-4-5-20251001
  requireAuth: true
  apiKey: ${env:ID_AGENT_API_KEY}
  plugins:
    - name: frontend-design
      path: ../plugins/claude-code/frontend-design
    - name: id-rest-ap
      path: ../plugins/claude-code/id-rest-ap

agents:
  - name: designer1
    description: UI component designer

  - name: designer2
    description: Layout and page designer

  - name: designer3
    description: Visual design and styling specialist
