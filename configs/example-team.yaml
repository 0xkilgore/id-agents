# Example: Multi-Agent Team Configuration
# Deploy with: /deploy configs/example-team.yaml
#
# Shows a mixed team with both Claude Code and Codex agents.

version: "1"
team: dev-team

defaults:
  local: true
  runtime: claude-code-cli
  model: claude-opus-4-6
  skills:
    - identity
    - inter-agent
    - catalog

agents:
  - name: architect
    description: "System design and architecture lead"
    workingDirectory: /path/to/project

  - name: coder
    description: "Implementation specialist — writes and reviews code"
    runtime: codex
    model: gpt-5.4
    workingDirectory: /path/to/project

  - name: reviewer
    description: "Code review and quality assurance"
    workingDirectory: /path/to/project
