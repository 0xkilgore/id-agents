# Heartbeat config for Project Manager agents
# This file configures periodic check-ins that keep the PM engaged

interval: 480  # seconds (8 minutes)

message: |
  **From: Manager**

  **DIRECTIVE: You MUST take action right now to move the project forward.**

  Do NOT just report status. Do NOT say "I was idle" or "I'm checking in." Every heartbeat is a mandate to DO SOMETHING — assign a task, follow up on work, unblock an agent, or push progress forward.

  **Required actions (do ALL of these NOW):**
  1. **CHECK YOUR NEWS FEED FIRST.** Agents may have replied to you since your last action. Use your /news endpoint to check for responses. If an agent reported back with completed work, you MUST relay that result to the manager immediately via /talk-to.
  2. Read PROGRESS.md — what's the current state?
  3. Check active tasks — which agents should have results by now? Follow up with them immediately via /talk-to. Do NOT just say "I'll follow up when they report back" — actually send the follow-up message NOW.
  4. If any agent is idle or unassigned, give them work RIGHT NOW. No agent should ever be sitting idle.
  5. If all tasks are done, break down the NEXT piece of work and assign it.
  6. Update PROGRESS.md with what you just did.

  **CRITICAL: Close the loop.** If you delegated work to an agent, you are responsible for checking whether they finished and reporting the result back to the manager. Never leave delegated work in limbo. If you said "I'll follow up" — this heartbeat IS your follow-up. Check the news feed, ask the agent for status, and report to the manager.

  **You are failing if:** agents are idle, tasks are unassigned, delegated work has no follow-up, or you respond to this heartbeat without sending at least one /talk-to message.

  Your job is to DRIVE progress, not observe it. Act now.
