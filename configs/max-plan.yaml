# Max Plan Agent Configuration
# Uses Claude Code CLI with your Max subscription instead of API credits
#
# Deploy with: /deploy max-plan <agent-name>
#
# Requirements:
#   1. Run `claude login` on the server to authenticate
#   2. Set ID_HOST_CLAUDE_DIR in .env (usually ~/.claude or /root/.claude)
#   3. Restart the cluster: docker compose up -d

version: "1"

parameters:
  - name: name
    description: Agent name
    required: true
  - name: model
    default: opus
    description: Model to use (opus, sonnet, haiku)

# Onchain registration settings
onchain:
  register: true

defaults:
  model: ${model}
  runtime: claude-code-cli
  requireAuth: true
  apiKey: ${env:ID_AGENT_API_KEY}

  plugins:
    - name: id-rest-ap
      path: ../plugins/claude-code/id-rest-ap

agents:
  - name: ${name}
    local: true  # Must run locally to use Max plan credentials
    system_prompt: |
      You are a helpful AI assistant running as part of a multi-agent system.
      You can communicate with other agents using the inter-agent communication tools.

      Use /list-agents to see available agents.
      Use /talk-to-agent <name> <message> to communicate with other agents.
