# Project Manager Agent Config
# ============================
# Deploys a project manager agent that coordinates other agents.
# This is a regular claude agent with coordination instructions.
#
# The PM:
# - Reports to the manager (human via CLI)
# - Coordinates worker agents (devs, designers, etc.)
# - Tracks progress in PROGRESS.md
# - Delegates work, never writes code itself
#
# Usage: /deploy pm [name]
#
# Examples:
#   /deploy pm           # Creates "pm" (default name)
#   /deploy pm lead      # Creates PM named "lead"

version: "1.0"

parameters:
  - name: name
    default: pm
    description: Name for the project manager

defaults:
  runtime: claude-code-cli  # Uses Max plan credentials
  model: opus

agents:
  - name: ${name}
    type: claude            # Regular agent, visible to all
    local: true             # Run locally to use Max plan
    register: true          # Register onchain for verifiable identity
    claudeMdFile: claudeMd-pm.md
    heartbeatFile: heartbeat-pm.yaml  # Periodic check-in config
    # Restrict tools to coordination only - NO code writing
    allowedTools:
      - Read           # Read documentation and project specs
      - Bash           # Run curl for /talk-to API calls
      - Write          # ONLY for PROGRESS.md tracking
      - Edit           # ONLY for PROGRESS.md tracking
      - Glob           # Find files to understand project structure
