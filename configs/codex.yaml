# Example: Single Agent (OpenAI Codex)
# Deploy with: /deploy configs/example-codex.yaml
# Requires: codex login (OAuth) or OPENAI_API_KEY env var

version: "1"

defaults:
  local: true
  runtime: codex
  skills:
    - identity
    - inter-agent
    - catalog

agents:
  - name: coder
    description: "A Codex-powered coding agent"
    model: gpt-5.4
    workingDirectory: /path/to/project
