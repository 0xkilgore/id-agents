# Test Configuration for API Key Authentication
# Used by integration tests for auth features
# Deploy with: /deploy test-require-auth [name]

version: "1"

parameters:
  - name: name
    default: auth-test
    description: Name for the test agent

defaults:
  runtime: claude-agent-sdk
  model: claude-haiku-4-5-20251001
  requireAuth: true  # Requires API key authentication
  apiKey: ${env:ID_AGENT_API_KEY}
  plugins:
    - name: id-rest-ap
      path: ../plugins/claude-code/id-rest-ap

agents:
  - name: ${name}
    description: Auth test agent - requires API key
    systemPrompt: |
      You are a helpful assistant for testing.
      When asked math questions, answer directly and concisely.
