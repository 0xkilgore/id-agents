# Generic Heartbeat Config
# Use this for any agent that needs periodic check-ins
# Customize the message for specific agent roles

interval: 300  # seconds (5 minutes)

message: |
  **From: Manager**

  **Instruction:** Periodic check-in time.

  [TESTING] Send a brief status update to me via /talk-to after completing this.

  ToDo:
  1. What task are you working on?
  2. Is anything blocked or waiting?
  3. Do you need to communicate with another agent?
  4. What's your next action?

  If idle, check your news feed for new messages or tasks.
