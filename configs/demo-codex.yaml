# Demo Team (Codex only)
# Deploy with: /deploy demo-codex
#
# A simple team using OpenAI Codex CLI. Uses the default team
# so no team switching is needed.
# Requires: codex login (OAuth) or OPENAI_API_KEY env var.

version: "1"
team: default

defaults:
  local: true
  runtime: codex
  skills:
    - identity
    - inter-agent
    - catalog

agents:
  - name: coder
    description: "Writes and reviews code"

  - name: researcher
    description: "Research, analysis, and documentation"
